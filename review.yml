    summary: >-
      No public, documented developer API or developer portal could be confirmed
      for King Saud University. The main website, library affairs site, Edugate
      SIS, LMS, Saudi Digital Library access, and manuscripts portal all resolve
      and are live, but they are end-user web applications gated behind
      institutional SSO/login with no published API reference, OpenAPI definition,
      or open-data API endpoint. A DSpace institutional repository is referenced
      in third-party registries, but its repository subdomain and OAI-PMH endpoint
      did not resolve at review time. Findings reflect strict no-fabrication
      discipline; no endpoints were invented.
