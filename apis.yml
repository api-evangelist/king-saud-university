name: King Saud University
description: >-
  King Saud University (KSU) is a public research university in Riyadh, Saudi
  Arabia, founded in 1957, and ranked #200 in the QS World University Rankings
  2025. KSU operates a broad estate of digital services — including the Edugate
  student information system, an LMS, a library catalog, Saudi Digital Library
  access, a digitized manuscripts portal, and university e-services — but it does
  not publish a public, documented developer or API program. The systems found
  during review are end-user web applications gated behind institutional SSO/login
  rather than openly documented APIs. No public API reference, OpenAPI definition,
  developer portal, or open-data API endpoint could be confirmed.
